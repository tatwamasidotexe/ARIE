services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: arie
      POSTGRES_PASSWORD: arie
      POSTGRES_DB: arie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arie"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arie-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - arie-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arie-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://arie:arie@postgres:5432/arie
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
      HF_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET}
      REDDIT_USER_AGENT: ARIE/1.0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
      PROMETHEUS_PORT: 9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - arie-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:

networks:
  arie-network:
    driver: bridge